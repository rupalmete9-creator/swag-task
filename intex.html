<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .calculator{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        #display{
            width:100%;
            height:50px;
            font-size:24px;
            text-align:right;
            margin-bottom:10px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,60px);
            gap:10px;
        }

        button{
            height:60px;
            font-size:20px;
            cursor:pointer;
        }
        h1{
            color: #000;
        }
    </style>
</head>
<body>
    <div class="calculator">
    <h1> Calculator </h1>

    <inputtype="text" id="display" readonly>

    <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>-</button>

        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>+</button>

        <button>C</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
